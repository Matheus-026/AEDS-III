<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários</title>
    <!-- Link css of page -->
    <link rel="stylesheet" href="../css/style_usuarios.css">
    <!-- Link css standard of pages -->
    <link rel="stylesheet" href="../css/style_standard.css">
    <!-- Link Google fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <!-- HEADER -->
	    <header class="navbar">
	        <div class="logo">
	            <img src="../images/logoCoruja.png">
	        </div>
	
	        <nav>
	            <a href="page_adm.html">Página Inicial</a>
	            <a href="livro.html">Livros</a>
	            <a href="autor.html">Autores</a>
	            <a href="usuario.html">Usuários</a>
	            <a href="emprestimo.html">Empréstimos</a>
	            <a href="pesquisa_avancada.html">Pesquisa Avançada</a>
	        </nav>
	
	        <div class="nav-icons">
	            <img src="../images/Notificacao.png" class="iconNotificacao">
	            <img src="../images/Perfil.png" class="iconPerfil">
	        </div>
	    </header>
	
	    <!-- CONTEÚDO -->
	    <section class="container">
	
	        <div class="top-bar">
	            <h2>Gestão de Usuários</h2>
                <input class="input_search" type="search" name="" id="search_usuario">
	            <button class="btn btn-primary" onclick="abrirModal()">+ Registrar Usuário</button>
	        </div>
	
	        <!-- TABELA — tbody preenchido dinamicamente pelo JS -->
	        <table>
	            <thead>
	                <tr>
	                    <th>Nome</th>
	                    <th>E-mail</th>
	                    <th>Tipo</th>
                        <th>Ações</th>
	                </tr>
	            </thead>
	            <tbody>
	                <!-- Linhas inseridas por renderizarTabela() -->
	            </tbody>
	        </table>
	
	    </section>
	
	    <!-- MODAL -->
	    <div class="modal" id="modal">
	        <div class="modal-content">
	
	            <span class="close" onclick="fecharModal()">&times;</span>
	
	            <!-- Título muda entre "Registrar" e "Editar" -->
	            <h4 id="modal-titulo">Registrar Usuário</h4>
	
	            <form id="formUsuario" autocomplete="off">
	
	                <label>Nome</label>
	                <input id="input-nome" type="text" placeholder="Digite nome do usuário" required>
	
					<label>E-mail</label>
					<input id="input-email" type="email" placeholder="Digite o e-mail" required>
	
	                <label>Tipo</label>
	                <select id="input-tipo">
                        <option value="Standard">Standard</option>
                        <option value="adm">Adm</option>
                    </select>

                    <label>Senha</label>
                    <input id="input-senha" type="password" placeholder="Digite a senha" required>
	
	                <div class="modal-actions">
	                    <button type="button" onclick="fecharModal()">Cancelar</button>
	                    <!-- Texto muda entre "Adicionar" e "Salvar" -->
	                    <button type="submit" id="btn-submit">Adicionar</button>
	                </div>
	
	            </form>
	        </div>
	    </div>
	
	    <!-- Toast de feedback (sucesso / erro) -->
	    <div id="toast" class="toast" style="display:none;"></div>
    </main>
	
    <!-- Script of page -->
	<script src="../js/script_usuarios.js"></script>
</body>
</html>

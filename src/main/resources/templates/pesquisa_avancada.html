<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa Avançada - Bibliotech</title>
    <link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/style_standard.css}">
    <link rel="stylesheet" th:href="@{/css/style_pesquisa.css}">

</head>
<body>
    <header class="navbar">
	        <div class="logo">
	            <img th:src="@{/imgs/logoCoruja.png}" alt="Logo da Bibliotech">
	        </div>
	
	        <nav>
				<a th:href="@{/adm}">Página Inicial</a>
				<a th:href="@{/livros}">Livros</a>
				<a th:href="@{/autores}">Autores</a>
				<a th:href="@{/usuarios}">Usuários</a>
				<a th:href="@{/emprestimos}">Empréstimos</a>
				<a th:href="@{/pesquisa}">Pesquisa Avançada</a>
	        </nav>
	
	        <div class="nav-icons">
                <img th:src="@{/imgs/Notificacao.png}" class="iconNotificacao">
	            <img th:src="@{/imgs/Perfil.png}" class="iconPerfil">
	        </div>
	    </header>
        <section class="container" style="max-width: 1400px;">
            <div class="top-bar">
                <h1>Pesquisa Avançada</h1>
            </div>
        
            <div class="layout-esq-dir">
        
                <div class="coluna-resultados">
                    <div id="resultados"></div>
                </div>
        
                <form class="pesquisa-form">
                    <div class="form-grid">
        
                        <div class="form-bloco">
                            <h3>Livros</h3>
                            <div class="campos-linha">
                                <div class="input-group">
                                    <label>Título</label>
                                    <input type="text" name="titulo" placeholder="Ex: O Senhor dos Anéis">
                                </div>
                                <div class="input-group">
                                    <label>Gênero</label>
                                    <input type="text" name="genero">
                                </div>
                            </div>
                            <div class="input-group">
                                <label>Preço: <span id="valorPrecoAtual">R$ 100</span></label>
                                <div class="preco-range">
                                    <span>R$ 20</span>
                                    <input type="range" name="preco" min="20" max="200" value="100">
                                    <span>R$ 200</span>
                                </div>
                            </div>
                        </div>
        
                        <div class="form-bloco">
                            <h3>Autores</h3>
                            <div class="campos-linha">
                                <div class="input-group">
                                    <label>Nome do Autor</label>
                                    <input type="text" name="nomeAutor" placeholder="Ex: Machado de Assis">
                                </div>
                                <div class="input-group">
                                    <label>Telefone</label>
                                    <input type="tel" name="telefoneAutor" placeholder="(31) 99999-9999">
                                </div>
                            </div>
                        </div>
        
                        <div class="form-bloco">
                            <h3>Usuários</h3>
                            <div class="campos-linha">
                                <div class="input-group">
                                    <label>Nome</label>
                                    <input type="text" name="nomeUsuario">
                                </div>
                                <div class="input-group">
                                    <label>E-mail</label>
                                    <input type="email" name="emailUsuario">
                                </div>
                            </div>
                        </div>
        
                        <div class="form-bloco">
                            <h3>Empréstimos</h3>
                            <div class="campos-linha">
                                <div class="input-group">
                                    <label>Livro Emprestado</label>
                                    <input type="text" name="livroEmprestado" placeholder="Título do livro">
                                </div>
                                <div class="input-group">
                                    <label>Nome do Usuário</label>
                                    <input type="text" name="usuarioEmprestimo" placeholder="Quem pegou o livro?">
                                </div>
                            </div>
                            <div class="campos-linha">
                                <div class="input-group">
                                    <label>Data Inicial</label>
                                    <input type="date" name="dataInicial">
                                </div>
                                <div class="input-group">
                                    <label>Data Final</label>
                                    <input type="date" name="dataFinal">
                                </div>
                            </div>
                        </div>
        
                    </div>
        
                    <div class="form-acoes">
                        <button type="button" class="btn-limpar">Limpar Filtros</button>
                        <div class="botoes-direita">
                            <button type="button" class="btn-cancelar">Cancelar</button>
                            <button type="submit" class="btn-buscar">Buscar</button>
                        </div>
                    </div>
                </form>
        
            </div>
        </section>
        <!-- JS -->
        <script th:src="@{/js/pesquisa_avancada.js}"></script>
</body>
</html>
